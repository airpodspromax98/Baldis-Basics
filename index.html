<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clever | Portal</title>

    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/wZKh3RtG/favicon.jpg">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/TemplateData/style.css" />
    <script src="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/TemplateData/UnityProgress.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/baldi.js"></script>
    
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "https://rawcdn.githack.com/Nailington/3kh0-assets/aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/baldi.json", {
        onProgress: UnityProgress,
        Module: {
          onRuntimeInitialized: function () {
            UnityProgress(gameInstance, "complete");
          },
        },
      });
    </script>

    <style>
        /* 1. RESET & THEME */
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            width: 100%;
            overflow: hidden !important;
            background-color: rgb(35, 31, 32); /* Matches Baldi's loading color */
            font-family: Arial, sans-serif;
        }

        /* 2. THE TOP BAR - PURE WHITE / NORMAL WEIGHT */
        #topbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 60px !important;
            background-color: #ffffff !important; 
            display: flex !important;
            align-items: center !important;
            padding: 0 15px !important;
            z-index: 1000000 !important;
            box-sizing: border-box !important;
            border-bottom: 1px solid #e0e0e0;
        }

        #topbar img {
            height: 40px !important;
            margin-right: 12px !important;
        }

        #topbar a {
            color: #000000 !important;
            text-decoration: none !important;
            font-size: 20px !important;
            font-weight: normal !important; 
        }

        /* 3. GAME CONTENT POSITIONING */
        .webgl-content {
            position: absolute !important;
            top: 60px !important; /* Starts below white bar */
            left: 0 !important;
            width: 100% !important;
            height: calc(100% - 60px) !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        #gameContainer {
            width: 800px !important; 
            height: 560px !important;
            margin: auto !important;
        }
    </style>
</head>
<body>

    <div id="topbar">
        <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
        <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
    </div>

    <div class="webgl-content">
        <div id="gameContainer"></div>
    </div>

    <script>
        // Ensure focus for controls
        window.addEventListener('mousedown', function() {
            window.focus();
        });
    </script>

</body>
</html>
