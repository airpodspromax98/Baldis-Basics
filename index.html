<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/TemplateData/style.css" />
  
  <title>Clever | Portal</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    /* 1. THE TOP BAR FIX - Forces white and removes blue tints */
    #topbar {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 60px !important;
      background-color: #ffffff !important; /* Pure White */
      background: #ffffff !important;
      color: #000000 !important;
      display: flex !important;
      align-items: center !important;
      padding: 0 15px !important;
      z-index: 999999 !important; /* Always on top */
      font-family: Arial, sans-serif !important;
      box-shadow: none !important;
      border: none !important;
    }

    #topbar img {
      height: 40px !important;
      margin-right: 12px !important;
      background: transparent !important;
    }

    #topbar a {
      color: #000000 !important;
      text-decoration: none !important;
      font-size: 20px !important;
      font-weight: 600 !important;
      background: transparent !important;
    }

    /* 2. BODY & CONTAINER SETUP */
    body, html {
      margin: 0 !important;
      padding: 0 !important;
      background-color: #000000 !important; /* Pure Black for game area */
      overflow: hidden !important;
      width: 100%;
      height: 100%;
    }

    .webgl-content {
      position: absolute !important;
      top: 60px !important; /* Starts right after the bar */
      width: 100% !important;
      height: calc(100% - 60px) !important;
      background: #000000 !important;
    }

    #unityContainer, #gameContainer, canvas {
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      display: block !important;
      background: #000000 !important;
    }

    /* Hide any default loading bars that might be blue */
    .progress, #unity-loading-bar {
      display: none !important;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/TemplateData/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/baldi.js"></script>
</head>

<body>

  <div id="topbar">
    <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
    <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
  </div>

  <div class="webgl-content">
    <div id="unityContainer">
      <div id="gameContainer"></div>
    </div>
  </div>

  <script>
    // 3. GAME INITIALIZATION
    var gameInstance = UnityLoader.instantiate(
      "gameContainer", 
      "https://rawcdn.githack.com/Nailington/3kh0-assets/aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/baldi.json", 
      {
        onProgress: UnityProgress,
        Module: {
          onRuntimeInitialized: function () {
            UnityProgress(gameInstance, "complete");
          },
        },
      }
    );

    // 4. THE 360-SPIN POINTER LOCK FIX
    // Triggers when the user clicks the game for the first time
    document.addEventListener('mousedown', function (e) {
      var canvas = document.querySelector('canvas');
      if (canvas && e.target === canvas) {
        canvas.requestPointerLock = canvas.requestPointerLock || 
                                    canvas.mozRequestPointerLock || 
                                    canvas.webkitRequestPointerLock;
        canvas.requestPointerLock();
      }
    });

    // Keep the game focused
    window.addEventListener('click', function() {
       window.focus();
    });
  </script>

</body>
</html>
