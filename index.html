<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Clever | Portal</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/TemplateData/style.css" />
  <script src="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/TemplateData/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/Nailington/3kh0-assets@aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/baldi.js"></script>

  <style>
    /* 1. RESET EVERYTHING */
    body, html {
      margin: 0 !important;
      padding: 0 !important;
      background-color: #000000 !important; /* Pure black for the game area */
      overflow: hidden !important;
      width: 100%;
      height: 100%;
    }

    /* 2. THE TOP BAR - EXACTLY LIKE BACKROOMS/BAD PARENTING */
    #topbar {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 60px !important;
      background-color: #ffffff !important; /* Forces White */
      display: flex !important;
      align-items: center !important;
      padding: 0 15px !important;
      z-index: 999999 !important; 
      box-sizing: border-box !important;
      border: none !important;
    }

    #topbar img {
      height: 40px !important;
      margin-right: 12px !important;
    }

    #topbar a {
      color: #000000 !important; /* Pure Black Text */
      text-decoration: none !important;
      font-family: Arial, sans-serif !important;
      font-size: 20px !important;
      font-weight: 500 !important;
    }

    /* 3. THE GAME AREA SETUP */
    .webgl-content {
      position: absolute !important;
      top: 60px !important; /* Starts exactly below the bar */
      width: 100% !important;
      height: calc(100% - 60px) !important;
      background-color: #000000 !important;
      margin: 0 !important;
    }

    #unityContainer, #gameContainer, canvas {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      background: #000000 !important;
      border: none !important;
    }

    /* Hide any default Unity loading bars that turn blue */
    .progress, .logo, #unity-loading-bar {
      display: none !important;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
    <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
  </div>

  <div class="webgl-content">
    <div id="unityContainer">
      <div id="gameContainer"></div>
    </div>
  </div>

  <script>
    // 4. GAME START
    var gameInstance = UnityLoader.instantiate(
      "gameContainer", 
      "https://rawcdn.githack.com/Nailington/3kh0-assets/aeb371b7e88542fd5e61eeed9e967a446d84fe1b/baldis-basics/baldi.json", 
      { onProgress: UnityProgress }
    );

    // 5. THE 360-SPIN FIX (Pointer Lock)
    // Clicking the game traps the mouse inside so you can turn around properly
    document.addEventListener('mousedown', function (e) {
      var canvas = document.querySelector('canvas');
      if (canvas && e.target === canvas) {
        canvas.requestPointerLock = canvas.requestPointerLock || 
                                    canvas.mozRequestPointerLock || 
                                    canvas.webkitRequestPointerLock;
        canvas.requestPointerLock();
      }
    });
  </script>

</body>
</html>
